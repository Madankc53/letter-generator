<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>बैंक स्टेटमेन्ट माग निवेदन | Bank Statement Request Letter Nepal</title>
  <meta name="description" content="नेपालमा बैंक स्टेटमेन्ट माग गर्नको लागि तयार निवेदन पत्र।"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://letter.madankc.com.np/letter-for-bank/bank-statement.html"/>
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Nepal&family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/components/letter.css"/>
</head>
<body>
<div id="site-header"></div>
<div class="page-hero">
  <div class="breadcrumb"><a href="/">गृहपृष्ठ</a> › <a href="/letter-for-bank/bank-letters.html">बैंक पत्र</a> › बैंक स्टेटमेन्ट माग पत्र</div>
  <h1>📊 बैंक स्टेटमेन्ट माग निवेदन पत्र</h1>
  <p>Bank Statement Request Letter — Nepal</p>
</div>
<div class="container">
  <div class="ad-slot">📢 Advertisement</div>
  <div class="form-card">
    <div class="form-section-title">📝 विवरण भर्नुहोस्</div>
    <div class="form-grid">
      <div class="form-group"><label>पूरा नाम * | Full Name</label><input type="text" id="full_name" placeholder="राम बहादुर श्रेष्ठ"/></div>
      <div class="form-group"><label>बैंकको नाम * | Bank Name</label><input type="text" id="bank_name" placeholder="नबिल बैंक लि."/></div>
      <div class="form-group"><label>शाखा | Branch</label><input type="text" id="branch_name" placeholder="दमौली शाखा"/></div>
      <div class="form-group"><label>खाता नम्बर * | Account Number</label><input type="text" id="account_no" placeholder="XXXXXXXXXXXXXXXX"/></div>
      <div class="form-group"><label>स्टेटमेन्टको अवधि (देखि) | From Date</label><input type="date" id="from_date"/></div>
      <div class="form-group"><label>स्टेटमेन्टको अवधि (सम्म) | To Date</label><input type="date" id="to_date"/></div>
      <div class="form-group"><label>स्टेटमेन्ट किन चाहिन्छ? | Purpose</label>
        <select id="purpose">
          <option value="भिसाको लागि">भिसाको लागि (Visa Purpose)</option>
          <option value="ऋणको लागि">ऋणको लागि (Loan Purpose)</option>
          <option value="व्यक्तिगत प्रयोजनको लागि">व्यक्तिगत प्रयोजनको लागि</option>
          <option value="कर विवरणको लागि">कर विवरणको लागि (Tax Purpose)</option>
        </select>
      </div>
      <div class="form-group"><label>ठेगाना * | Address</label><input type="text" id="address" placeholder="शुक्लागण्डकी-३, तनहुँ"/></div>
      <div class="form-group"><label>सम्पर्क नम्बर | Phone</label><input type="tel" id="phone" placeholder="९८XXXXXXXX"/></div>
      <div class="form-group"><label>मिति | Date</label><input type="date" id="date"/></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="resetForm()">🔄 Reset</button>
      <button class="btn btn-primary" onclick="generateLetter()">📄 पत्र बनाउनुहोस्</button>
    </div>
  </div>
  <div class="ad-slot">📢 Advertisement</div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">✅ पत्र तयार छ!</div>
      <div class="modal-actions">
        <button class="btn btn-secondary btn-sm" onclick="closeModal()">✖ बन्द</button>
        <button class="btn btn-primary btn-sm" onclick="window.print()">🖨️ Print</button>
      </div>
    </div>
    <div class="modal-body"><div class="letter-doc" id="letterDoc"></div></div>
  </div>
</div>
<div id="site-footer"></div>
<div class="toast" id="toast"></div>
<script src="/components/loader.js"></script>
<script src="/components/letter.js"></script>
<script>
document.getElementById('date').valueAsDate = new Date();
function generateLetter() {
  const name = document.getElementById('full_name').value.trim();
  const bank = document.getElementById('bank_name').value.trim();
  const branch = document.getElementById('branch_name').value.trim();
  const accNo = document.getElementById('account_no').value.trim();
  const fromDate = document.getElementById('from_date').value;
  const toDate = document.getElementById('to_date').value;
  const purpose = document.getElementById('purpose').value;
  const address = document.getElementById('address').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const dateStr = getDate();
  if (!name) { showToast('❌ नाम अनिवार्य छ!', 'error'); return; }
  if (!bank) { showToast('❌ बैंकको नाम अनिवार्य छ!', 'error'); return; }
  if (!accNo) { showToast('❌ खाता नम्बर अनिवार्य छ!', 'error'); return; }
  const fromStr = fromDate ? new Date(fromDate).toLocaleDateString('ne-NP') : '............';
  const toStr = toDate ? new Date(toDate).toLocaleDateString('ne-NP') : '............';
  const html = `
    <p class="right">मिति: ${dateStr}</p><br/>
    <p><strong>श्रीमान् शाखा प्रबन्धक महोदय,</strong></p>
    <p>${bank}${branch ? ', ' + branch : ''},</p>
    <p>${address}</p><br/>
    <p><strong>विषय: बैंक स्टेटमेन्ट उपलब्ध गराइदिने सम्बन्धमा ।</strong></p><br/>
    <p>महोदय,</p>
    <p>म <strong>${name}</strong>, ${address} बासिन्दाको तपाईंको बैंकमा खाता नम्बर <strong>${accNo}</strong> रहेको छ । <strong>${purpose}</strong> मिति <strong>${fromStr}</strong> देखि <strong>${toStr}</strong> सम्मको बैंक स्टेटमेन्ट आवश्यक परेकोले कृपया उपलब्ध गराइदिनुहुन हार्दिक अनुरोध गर्दछु ।</p>
    <br/><br/>
    <p>निवेदक,</p><br/><br/>
    <p>..............................</p>
    <p><strong>${name}</strong></p>
    <p>खाता नं.: ${accNo}</p>
    <p>${address}</p>
    ${phone ? '<p>सम्पर्क: ' + phone + '</p>' : ''}
  `;
  showLetter(html);
}
</script>
</body>
</html>
